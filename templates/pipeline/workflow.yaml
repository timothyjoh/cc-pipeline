# Pipeline Workflow Configuration

# Agents:
#   claudecode  → Claude Code via Agent SDK (all AI steps)
#   bash        → run shell command directly, no AI
#
# Models (optional — omit to use CLI default):
#   opus, sonnet, haiku

name: "Default Pipeline"
version: 1

phases_dir: "docs/phases"

steps:
  - name: spec
    description: "Break project vision into phase spec"
    agent: claudecode
    # model: sonnet
    prompt: prompts/spec.md
    output: "SPEC.md"

  - name: research
    description: "Analyze current codebase state"
    agent: claudecode
    # model: sonnet
    prompt: prompts/research.md
    output: "RESEARCH.md"

  - name: plan
    description: "Create actionable implementation plan"
    agent: claudecode
    # model: sonnet
    prompt: prompts/plan.md
    output: "PLAN.md"

  - name: build
    description: "Implement the plan with agent teams"
    agent: claudecode
    prompt: prompts/build.md
    test_gate: true

  - name: review
    description: "Staff engineer code + test review"
    agent: claudecode
    # model: opus
    prompt: prompts/review.md
    output: "REVIEW.md"

  - name: fix
    description: "Address review findings"
    agent: claudecode
    prompt: prompts/fix.md
    skip_unless: "MUST-FIX.md"
    test_gate: true

  - name: reflect
    description: "Look back + look forward for next phase"
    agent: claudecode
    prompt: prompts/reflect.md
    output: "REFLECTIONS.md"

  - name: status
    description: "Update STATUS.md with phase summary"
    agent: claudecode
    prompt: prompts/status.md

  - name: commit
    description: "Git commit + push"
    agent: bash
    continue_on_error: true
    command: "git rev-parse --git-dir > /dev/null 2>&1 || git init && git add -A && git commit -m 'Phase {{PHASE}} complete' || true && git push origin HEAD 2>/dev/null || true"

# Usage tracking
usage_check:
  when: phase_boundary    # pipeline_start, phase_boundary, every_step

# Usage budget thresholds for session_percentage / weekly_percentage
# in the pipeline.jsonl `status` step_done event.
# Adjust to match your Claude subscription tier.
usage_limits:
  session_budget_usd: 5     # cost budget per pipeline run
  weekly_budget_usd: 25     # cost budget per week
